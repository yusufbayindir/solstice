name: Solstice
options:
  bundleIdPrefix: app.solstice.ios
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug
  swiftVersion: "6.0"
  developmentLanguage: en

# Localizations available via Solstice/Localizable.xcstrings (String Catalog).
# The app follows the device language at runtime and falls back to English.
knownRegions:
  - en
  - tr
  - fr
  - de
  - es
  - it
  - pt-BR
  - pt-PT
  - nl
  - pl
  - ru
  - uk
  - ro
  - sv
  - nb
  - da
  - fi
  - el
  - cs
  - hu
  - hi
  - zh-Hans
  - zh-Hant
  - ja
  - ko
  - ar
  - he
  - id
  - ms
  - th
  - vi

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Solstice:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Solstice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.solstice.ios
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: Solstice/Solstice.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # Privacy usage strings — required by iOS. Without these the app HARD CRASHES
        # the first time Face ID / HealthKit is invoked, and App Review rejects the build.
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Solstice uses Face ID to lock the app, so your cycle stays private even if someone else has your phone."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Solstice reads your Menstrual Flow from Apple Health to keep your cycle predictions accurate. Your data stays on your device."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Solstice saves the periods you log to Apple Health, so your cycle data stays consistent across your health apps."
    entitlements:
      path: Solstice/Solstice.entitlements
      properties:
        com.apple.developer.healthkit: true
    capabilities:
      - type: healthKit

  SolsticeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - SolsticeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.solstice.ios.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Solstice

schemes:
  Solstice:
    build:
      targets:
        Solstice: all
    test:
      targets:
        - SolsticeTests
    run:
      config: Debug
      # Local StoreKit testing — products resolve from this file in the
      # simulator with no Apple Developer account or App Store Connect setup.
      storeKitConfiguration: Solstice.storekit
    archive:
      config: Release

  SolsticeTests:
    build:
      targets:
        SolsticeTests: all
    test:
      targets:
        - SolsticeTests
