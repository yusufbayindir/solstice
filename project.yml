name: Solstice
options:
  bundleIdPrefix: app.solstice.ios
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug
  swiftVersion: "6.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Solstice:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Solstice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.solstice.ios
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: Solstice/Solstice.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    entitlements:
      path: Solstice/Solstice.entitlements
      properties:
        com.apple.developer.healthkit: true
    capabilities:
      - type: healthKit

  SolsticeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - SolsticeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.solstice.ios.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Solstice

schemes:
  Solstice:
    build:
      targets:
        Solstice: all
    test:
      targets:
        - SolsticeTests
    run:
      config: Debug
    archive:
      config: Release

  SolsticeTests:
    build:
      targets:
        SolsticeTests: all
    test:
      targets:
        - SolsticeTests
